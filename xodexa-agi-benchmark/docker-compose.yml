# Xodexa AI Benchmark — all-in-one stack.
# The `server` serves BOTH the REST API (/api, /v1) and the static frontend (/).
# Postgres is the source of truth; the `worker` runs benchmark jobs against users'
# own model APIs. Copy .env.example -> .env and fill the secrets before `up`.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xodexa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xodexa}
      POSTGRES_DB: ${POSTGRES_DB:-xodexa}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xodexa}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports: ["6379:6379"]

  server:
    build: { context: ., dockerfile: apps/server/Dockerfile }
    command: uvicorn apps.server.main:app --host 0.0.0.0 --port 8000
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-xodexa}:${POSTGRES_PASSWORD:-xodexa}@db:5432/${POSTGRES_DB:-xodexa}
      REDIS_URL: redis://redis:6379/0
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
    ports: ["8000:8000"]

  worker:
    build: { context: ., dockerfile: apps/server/Dockerfile }
    command: python -m apps.worker.worker
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-xodexa}:${POSTGRES_PASSWORD:-xodexa}@db:5432/${POSTGRES_DB:-xodexa}
      REDIS_URL: redis://redis:6379/0
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }

volumes:
  pgdata:
